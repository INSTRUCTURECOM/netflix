<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notflix - Stream Free Movies</title>
    <style>
        :root {
            --primary: #E50914;
            --background: #141414;
            --surface: #181818;
            --surface-hover: #282828;
            --text: #FFFFFF;
            --text-muted: #AAAAAA;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--background);
            color: var(--text);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            overflow-x: hidden;
        }

        /* Navbar Layout */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 4%;
            position: fixed;
            top: 0;
            width: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
            z-index: 10;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .logo {
            color: var(--primary);
            font-size: 2rem;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            user-select: none;
        }

        /* Settings Menu Styles */
        .settings-container {
            position: relative;
        }

        .settings-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
        }

        .settings-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .settings-dropdown {
            display: none;
            position: absolute;
            top: 45px;
            left: 0;
            background-color: var(--surface);
            border: 1px solid #333;
            border-radius: 6px;
            padding: 15px;
            width: 220px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            z-index: 20;
        }

        .settings-dropdown.active {
            display: block;
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .setting-label {
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* Custom Toggle Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #444;
            transition: .3s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--primary);
        }

        input:checked + .slider:before {
            transform: translateX(20px);
        }

        .search-bar {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 10px 15px;
            color: white;
            border-radius: 4px;
            outline: none;
            width: 250px;
            font-size: 0.9rem;
            transition: width 0.3s ease, border-color 0.3s ease;
        }

        .search-bar:focus {
            width: 350px;
            border-color: var(--primary);
        }

        /* Main Content Grid */
        main {
            padding: 120px 4% 40px 4%;
        }

        h2 {
            margin-bottom: 25px;
            font-size: 1.6rem;
            font-weight: 500;
        }

        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 25px;
        }

        .movie-card {
            background-color: var(--surface);
            border-radius: 6px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.25s cubic-bezier(0.25, 0.8, 0.25, 1), box-shadow 0.25s ease;
            position: relative;
        }

        .movie-card:hover {
            transform: scale(1.06);
            box-shadow: 0 12px 24px rgba(0,0,0,0.6);
        }

        .movie-card img {
            width: 100%;
            display: block;
            aspect-ratio: 2/3;
            object-fit: cover;
            background-color: #222;
        }

        .movie-info {
            padding: 12px;
        }

        .movie-title {
            font-size: 0.95rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .loading-trigger {
            text-align: center;
            padding: 30px;
            color: var(--text-muted);
            font-size: 1.1rem;
            grid-column: 1 / -1;
        }

        /* Video Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            width: 90%;
            max-width: 1050px;
            aspect-ratio: 16/9;
            position: relative;
            background: #000;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(229, 9, 20, 0.25);
        }

        .close-btn {
            position: absolute;
            top: -45px;
            right: 0;
            color: white;
            font-size: 2.5rem;
            cursor: pointer;
            background: none;
            border: none;
            line-height: 1;
            z-index: 110;
        }

        .close-btn:hover {
            color: var(--primary);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-left">
            <div class="logo" id="logoBtn">NOTFLIX</div>
            
            <div class="settings-container">
                <button class="settings-btn" id="settingsToggleBtn">
                    ⚙️ Settings
                </button>
                <div class="settings-dropdown" id="settingsDropdown">
                    <div class="setting-item">
                        <span class="setting-label">Include 18+ Content</span>
                        <label class="switch">
                            <input type="checkbox" id="adultContentToggle">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
            </div>
        </div>

        <input type="text" class="search-bar" id="searchBar" placeholder="Search movies...">
    </header>

    <main>
        <h2 id="sectionTitle">Popular Movies</h2>
        <div class="movie-grid" id="movieGrid">
            </div>
        <div class="loading-trigger" id="loadingTrigger">Loading more titles...</div>
    </main>

    <div class="modal" id="playerModal">
        <div class="modal-content">
            <button class="close-btn" id="closeBtn">&times;</button>
        </div>
    </div>

    <script>
        const API_KEY = '86aa54fd6d8f15c6296d7e049fa62122';
        const BASE_URL = 'https://api.themoviedb.org/3';
        const IMG_URL = 'https://image.tmdb.org/t/p/w500';

        const movieGrid = document.getElementById('movieGrid');
        const searchBar = document.getElementById('searchBar');
        const sectionTitle = document.getElementById('sectionTitle');
        const logoBtn = document.getElementById('logoBtn');
        const playerModal = document.getElementById('playerModal');
        const closeBtn = document.getElementById('closeBtn');
        const modalContent = document.querySelector('.modal-content');
        
        // Settings elements selection
        const settingsToggleBtn = document.getElementById('settingsToggleBtn');
        const settingsDropdown = document.getElementById('settingsDropdown');
        const adultContentToggle = document.getElementById('adultContentToggle');
        
        let videoPlayer = null; 
        let currentPage = 1;
        let isFetching = false;
        let currentSearchQuery = '';
        let includeAdult = false; // Internal tracking global flag

        loadInitialData();

        function loadInitialData() {
            currentPage = 1;
            movieGrid.innerHTML = '';
            currentSearchQuery = '';
            fetchMovies();
        }

        async function fetchMovies() {
            if (isFetching) return;
            isFetching = true;
            document.getElementById('loadingTrigger').style.display = 'block';

            // Base discovery URL modified to include explicit dynamic adult value check flags
            let targetUrl = `${BASE_URL}/discover/movie?sort_by=popularity.desc&api_key=${API_KEY}&page=${currentPage}&include_adult=${includeAdult}`;
            
            if (currentSearchQuery) {
                targetUrl = `${BASE_URL}/search/movie?api_key=${API_KEY}&query=${encodeURIComponent(currentSearchQuery)}&page=${currentPage}&include_adult=${includeAdult}`;
            }

            try {
                const res = await fetch(targetUrl);
                const data = await res.json();
                
                if (data.results && data.results.length > 0) {
                    displayMovies(data.results);
                    currentPage++;
                } else if (currentPage === 1) {
                    movieGrid.innerHTML = `<h3 style="grid-column: 1/-1; text-align:center; color: var(--text-muted);">No movies match your search.</h3>`;
                    document.getElementById('loadingTrigger').style.display = 'none';
                } else {
                    document.getElementById('loadingTrigger').style.display = 'none';
                }
            } catch (error) {
                console.error("Data tracking failure:", error);
            } finally {
                isFetching = false;
            }
        }

        function displayMovies(movies) {
            movies.forEach(movie => {
                const { title, poster_path, id } = movie;
                if (!poster_path) return; 

                const movieEl = document.createElement('div');
                movieEl.classList.add('movie-card');
                movieEl.innerHTML = `
                    <img src="${IMG_URL + poster_path}" alt="${title}" loading="lazy">
                    <div class="movie-info">
                        <div class="movie-title">${title}</div>
                    </div>
                `;

                movieEl.addEventListener('click', () => openPlayer(id));
                movieGrid.appendChild(movieEl);
            });
        }

        /* --- Settings Interactivity Panel Logic --- */
        settingsToggleBtn.addEventListener('click', (e) => {
            e.stopPropagation(); // Avoid event context bubble triggers
            settingsDropdown.classList.toggle('active');
        });

        // Toggle state change watcher logic route
        adultContentToggle.addEventListener('change', (e) => {
            includeAdult = e.target.checked; 
            loadInitialData(); // Wipe the current layout display clean and fetch with the filter applied
        });

        // Close menu if clicking anywhere outside the dropdown layout frame boundaries
        document.addEventListener('click', (e) => {
            if (!settingsDropdown.contains(e.target) && e.target !== settingsToggleBtn) {
                settingsDropdown.classList.remove('active');
            }
        });

        searchBar.addEventListener('keyup', (e) => {
            const query = e.target.value.trim();
            if (query !== currentSearchQuery) {
                currentSearchQuery = query;
                currentPage = 1;
                movieGrid.innerHTML = '';
                
                if (query) {
                    sectionTitle.innerText = `Search Results for "${query}"`;
                } else {
                    sectionTitle.innerText = "Popular Movies";
                }
                fetchMovies();
            }
        });

        logoBtn.addEventListener('click', () => {
            searchBar.value = '';
            sectionTitle.innerText = "Popular Movies";
            loadInitialData();
        });

        window.addEventListener('scroll', () => {
            if (isFetching) return;
            const { scrollTop, scrollHeight, clientHeight } = document.documentElement;
            if (scrollTop + clientHeight >= scrollHeight - 300) {
                fetchMovies();
            }
        });

        function openPlayer(tmdbId) {
            if (videoPlayer) {
                videoPlayer.remove();
            }

            videoPlayer = document.createElement('iframe');
            videoPlayer.id = 'videoPlayer';
            videoPlayer.setAttribute("allowfullscreen", "true");
            videoPlayer.setAttribute("referrerpolicy", "origin");
            videoPlayer.setAttribute("sandbox", "allow-scripts allow-same-origin allow-forms allow-presentation");
            
            videoPlayer.src = `https://vidsrcme.ru/embed/movie/${tmdbId}`;
            
            modalContent.appendChild(videoPlayer);
            playerModal.classList.add('active');
        }

        function closePlayer() {
            playerModal.classList.remove('active');
            if (videoPlayer) {
                videoPlayer.src = ''; 
                videoPlayer.remove(); 
                videoPlayer = null;
            }
        }

        closeBtn.addEventListener('click', closePlayer);
        playerModal.addEventListener('click', (e) => {
            if (e.target === playerModal) closePlayer();
        });
    </script>
</body>
</html>
